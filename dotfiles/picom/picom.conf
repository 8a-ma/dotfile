# =============================================================================
# picom.conf — Optimizado para Intel HD 4600 (ThinkPad L440)
# Enfoque: Rendimiento máximo para liberar recursos a modelos LLM
# =============================================================================

# --- Backend de Renderizado
# glx es el más rápido para Intel, siempre que se use con los flags correctos.
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
use-damage = true; # Crucial para el rendimiento: solo redibuja lo que cambia.

# --- VSync (Eliminar Screen Tearing)
# Importante para los 60Hz de la pantalla del L440.
vsync = true;

# --- Sombras (Shadows)
# Desactivadas o mínimas para no estresar la GPU.
shadow = false; # Cambiar a 'true' solo si los bordes de i3 se ven muy planos.
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@:c"
];

# --- Opacidad (Transparencias)
# Usamos transparencias simples sin efectos de desenfoque.
active-opacity = 1.0;
inactive-opacity = 0.92;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "100:class_g = 'firefox'",
  "100:class_g = 'Lutris'",
  "90:class_g  = 'kitty' && !focused",
  "100:class_g = 'kitty' && focused"
];

# --- Difuminado (Blur)
# DESACTIVADO. El desenfoque de fondo consume demasiada GPU en procesadores Haswell.
blur-method = "none";
blur-strength = 0;

# --- Animaciones (Fading)
# Animaciones sutiles que dan sensación de fluidez sin lag.
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# --- Configuración General
corner-radius = 8; # Bordes ligeramente redondeados (estilo JaKooLit)
round-borders = 1;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-ewmh-active-win = true;

# Evitar que picom gestione ventanas de i3 que no lo necesitan
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.9; }
  dropdown_menu = { opacity = 0.9; }
};