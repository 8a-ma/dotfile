[colors]
; Colores base (Alineados con el estilo moderno de JaKooLit)
background = #282a36
background-alt = #44475a
foreground = #f8f8f2
primary = #bd93f9
secondary = #8be9fd
alert = #ff5555
disabled = #707880

[bar/top]
width = 100%
height = 24pt
radius = 6
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 4pt
border-color = #00000000
padding-left = 0
padding-right = 1
module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

; Fuentes: Asegúrate de tener instaladas las Nerd Fonts (Font Awesome)
font-0 = "JetBrainsMono Nerd Font:size=10;2"

modules-left = xworkspaces xwindow
modules-right = llm-monitor pulseaudio memory cpu battery date

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/memory]
type = internal/memory
; Intervalo largo (10s) para ahorrar CPU 
interval = 10
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
; Intervalo largo (5s) para ahorrar CPU 
interval = 5
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
; Ajuste específico para la batería del ThinkPad L440
battery = BAT0
adapter = AC
poll-interval = 10
format-charging = <label-charging>
format-discharging = <label-discharging>
label-charging = ⚡ %percentage%%
label-discharging = 🔋 %percentage%%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/date]
type = internal/date
interval = 10
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.primary}

[module/llm-monitor]
type = custom/script
; Script solicitado para monitorear recursos de modelos LLM 
exec = ~/dotfile/scripts/llm_monitor.sh
interval = 10
format-prefix = "AI: "
format-prefix-foreground = ${colors.secondary}