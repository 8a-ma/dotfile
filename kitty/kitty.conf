# =============================================================================
# kitty.conf
# Paleta: Catppuccin Mocha
# =============================================================================

# -- Clipboard

clipboard_control write-clipboard read-clipboard

# =============================================================================
# FUENTES
# =============================================================================

font_family         monospace
bold_font           auto
italic_font         auto
bold_italic_font    auto
 
font_size           10.0
 
# Sin ligaduras: menor carga gráfica en iGPU
disable_ligatures   always
 
# Escala conservadora para el renderer de caja
box_drawing_scale   0.001, 1, 1.5, 2

# =============================================================================
# RENDIMIENTO — Intel HD Graphics 4600
# =============================================================================

# Desactiva composición de GPU cuando no es necesaria
sync_to_monitor     yes
 
# Refresco conservador: 20 fps son suficientes para una terminal
repaint_delay       50
 
# Latencia de input reducida (ms entre lectura y render)
input_delay         2
 
# Sin aceleración de texto por GPU (más estable en Mesa i965)
text_composition_strategy  legacy

# =============================================================================
# CURSOR
# =============================================================================

cursor_shape            block
cursor_blink_interval   0

# =============================================================================
# SCROLLBACK
# =============================================================================

scrollback_lines    2000

# =============================================================================
# VENTANA
# =============================================================================

# Padding interno (coherente con gaps inner 2 de i3)
window_padding_width 4
 
# Sin decoraciones de título (i3 maneja los bordes)
hide_window_decorations yes
 
# Margen entre la terminal y el borde del pixel border de i3
placement_strategy  center

# =============================================================================
# TABS
# =============================================================================

tab_bar_edge        top
tab_bar_style       slant
tab_title_template  "{index}: {title}"

# =============================================================================
# PALETA — Catppuccin Mocha
# =============================================================================

# Fondo / Frente
background            #1e1e2e
foreground            #cdd6f4
 
# Cursor
cursor                #f5e0dc
cursor_text_color     #1e1e2e
 
# Selección
selection_background  #313244
selection_foreground  #cdd6f4
 
# URL
url_color             #89b4fa

# --- Colores de terminal (ANSI 0–15)

# Negro (base / surface)
color0  #45475a
color8  #585b70
 
# Rojo (red / maroon)
color1  #f38ba8
color9  #f38ba8
 
# Verde (green)
color2  #a6e3a1
color10 #a6e3a1
 
# Amarillo (yellow / peach)
color3  #f9e2af
color11 #f9e2af
 
# Azul (blue / sapphire)
color4  #89b4fa
color12 #89dceb
 
# Magenta (mauve / pink)
color5  #cba6f7
color13 #f5c2e7
 
# Cian (teal / sky)
color6  #94e2d5
color14 #94e2d5
 
# Blanco (text / subtext)
color7  #bac2de
color15 #cdd6f4

# =============================================================================
# MISC
# =============================================================================

# Sin sonido de campana
enable_audio_bell   no
 
# Cierre limpio sin confirmación
confirm_os_window_close 0