# =============================================================================
# picom.conf — Compositor para i3-gaps
# Optimizado para Intel HD 4600 (ThinkPad L440)
# =============================================================================
#
# Picom es el compositor de ventanas que añade:
#   - Transparencias y blur de fondo
#   - Sombras bajo las ventanas
#   - Animaciones de apertura/cierre
#   - Bordes redondeados
#   - VSync para evitar tearing
#
# Recarga sin reiniciar i3:
#   pkill picom && picom --config ~/.config/picom/picom.conf -b
#
# Para ver logs de error en tiempo real:
#   picom --config ~/.config/picom/picom.conf --log-level debug
#
# =============================================================================


# =============================================================================
# BACKEND DE RENDERIZADO
# =============================================================================
#
# El backend define cómo picom dibuja en pantalla. Es la decisión más
# importante para el rendimiento en hardware Intel.
#
# Opciones disponibles:
#   "xrender" → Usa la CPU. Estable pero lento para efectos avanzados.
#   "glx"     → Usa la GPU (OpenGL). Más rápido para blur/sombras, pero
#                requiere drivers funcionales. Recomendado para Intel HD.
#   "egl"     → Variante moderna de glx. Más eficiente en memoria.
#
# Para Intel HD 4600 usamos "glx" porque el driver i915 de Linux tiene
# soporte OpenGL maduro. Si ves glitches o crashes, prueba cambiarlo a
# "xrender" como fallback.
#
backend = "glx";

# GLX optimizations:
# glx-no-stencil → Deshabilita el stencil buffer. Mejora rendimiento ~15%
#                  sin impacto visual en la mayoría de configuraciones.
glx-no-stencil = true;

# glx-copy-from-front → En lugar de redibujar desde cero, copia el frame
# anterior. Reduce el trabajo de la GPU en frames estáticos.
glx-copy-from-front = false;

# use-damage → Solo redibuja las regiones de pantalla que realmente
# cambiaron (damaged regions). Ahorra mucho CPU/GPU en ventanas estáticas.
# Desactívalo si ves artefactos visuales.
use-damage = true;


# =============================================================================
# VSYNC
# =============================================================================
#
# VSync sincroniza el renderizado de picom con el refresco del monitor.
# Sin VSync, al mover ventanas rápido puedes ver "screen tearing"
# (una línea horizontal que parte la imagen).
#
# true  → Activa VSync. Elimina tearing. Pequeño overhead de latencia.
# false → Sin VSync. Más fluido en teoría, pero con tearing posible.
#
# Para L440 con pantalla de 60Hz, true es el valor correcto.
#
vsync = true;


# =============================================================================
# SOMBRAS
# =============================================================================
#
# Las sombras dan profundidad al escritorio. Se renderizan debajo de
# cada ventana para simular elevación (efecto "material design").
#
shadow = true;

# shadow-radius → Tamaño del difuminado de la sombra en píxeles.
#   Valores altos (>20) se ven bien pero consumen más GPU.
#   12–16 es el balance ideal para el L440.
shadow-radius = 14;

# shadow-opacity → Intensidad de la sombra. 0.0 = invisible, 1.0 = negra.
#   0.6–0.75 se ve natural sin ser agresiva.
shadow-opacity = 0.65;

# shadow-offset-x / shadow-offset-y → Desplazamiento de la sombra.
#   Valores negativos la mueven arriba/izquierda.
#   (-7, -7) da un efecto de luz cenital (como en macOS).
shadow-offset-x = -7;
shadow-offset-y = -7;

# shadow-color → Color de la sombra en hex. Negro puro por defecto.
shadow-color = "#000000";

# shadow-exclude → Lista de ventanas que NO deben tener sombra.
#   Reglas de exclusión importantes:
#
#   "_GTK_FRAME_EXTENTS@:c"   → Quita sombra duplicada en apps GTK3/4
#                               (Firefox, GNOME apps) que ya gestionan
#                               su propio borde.
#
#   "class_g = 'i3-frame'"    → El frame interno de i3. Evita sombra
#                               sobre el borde del WM.
#
#   "name = 'Notification'"   → Las notificaciones de dunst/notify-send
#                               no deberían tener sombra prominente.
#
#   "class_g = 'Polybar'"     → La barra no necesita sombra (se vería
#                               flotante de forma antinatural).
#
#   "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
#                             → Ventanas minimizadas/ocultas (scratchpad).
#
shadow-exclude = [
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'i3-frame'",
    "name = 'Notification'",
    "class_g = 'Polybar'",
    "class_g = 'dunst'",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];


# =============================================================================
# OPACIDAD Y TRANSPARENCIA
# =============================================================================
#
# La transparencia permite ver el fondo/otras ventanas a través de la
# ventana activa o inactiva. Funciona junto con el blur para el efecto
# "frosted glass" tipo macOS/Hyprland.
#
# active-opacity → Opacidad de la ventana enfocada actualmente.
#   1.0 = completamente opaca (recomendado para trabajo, evita distracción).
#   0.95–0.98 = ligeramente traslúcida para estética.
active-opacity = 1.0;

# inactive-opacity → Opacidad de ventanas en segundo plano.
#   0.85–0.92 da un indicio visual claro de cuál es la ventana activa.
inactive-opacity = 0.88;

# frame-opacity → Transparencia del borde/frame de la ventana.
#   0.7–0.9 se integra bien con el tema Catppuccin.
frame-opacity = 0.85;

# inactive-opacity-override → Si true, la opacidad definida arriba
# sobreescribe cualquier valor de transparencia que la app misma declare.
# false = respeta la transparencia de la app (ej: terminales con fondo semitransparente).
inactive-opacity-override = false;

# opacity-rule → Reglas de opacidad por aplicación. Formato:
#   "OPACIDAD:CONDICIÓN"   (opacidad en porcentaje entero)
#
# Explicación de cada regla:
#   Kitty/Alacritty  → Terminales con 90% para ver el fondo sutilmente
#   Rofi             → Launcher al 95% para no perder legibilidad del menú
#   dunst            → Notificaciones a 100% para máxima legibilidad
#   code-oss/VSCode  → Editor al 100% siempre (foco total en código)
#
opacity-rule = [
    "90:class_g = 'kitty' && focused",
    "85:class_g = 'kitty' && !focused",
    "90:class_g = 'Alacritty' && focused",
    "85:class_g = 'Alacritty' && !focused",
    "95:class_g = 'Rofi'",
    "100:class_g = 'dunst'",
    "100:class_g = 'code-oss'",
    "100:class_g = 'Code'",
    "100:class_g = 'firefox'",
    "100:class_g = 'Brave-browser'"
];


# =============================================================================
# BLUR DE FONDO (Frosted Glass)
# =============================================================================
#
# El blur aplica desenfoque gaussiano detrás de ventanas traslúcidas.
# Esto crea el efecto "frosted glass" característico de Hyprland/macOS.
#
# NOTA DE RENDIMIENTO para Intel HD 4600:
#   El blur es el efecto más costoso. Los parámetros abajo están
#   calibrados para ~60fps estables. Si notas lag al mover ventanas,
#   reduce blur-size o cambia method a "box" (más rápido, menos bonito).
#
blur-method = "dual_kawase";
# dual_kawase → Algoritmo moderno de Kawase con dos pasadas.
#               Más eficiente que gaussian para el mismo resultado visual.
#               Requiere picom con soporte de shaders (versión ≥ 9.x).
#               Si falla, usa "gaussian" como fallback.

blur-strength = 6;
# strength → Intensidad del blur en dual_kawase. Rango: 1–20.
#   1–4  → Sutil, casi imperceptible, mínimo impacto en GPU.
#   5–8  → Balance ideal para L440. Se ve bien sin lag.
#   9+   → Muy marcado, posible stuttering en apps con muchas ventanas.

# blur-size y blur-deviation son para method = "gaussian":
# blur-size = 10;
# blur-deviation = 5.0;

# blur-background → Aplica el blur detrás de ventanas con transparencia.
blur-background = true;

# blur-background-frame → También aplica blur al frame/borde de la ventana.
blur-background-frame = false;

# blur-background-fixed → Si true, usa un único frame de fondo para el blur
# en lugar de recalcular cada frame. Más eficiente pero puede verse
# "congelado" en animaciones. false = más preciso pero más costoso.
blur-background-fixed = false;

# blur-kern → Kernel de convolución para blur gaussiano (no se usa con dual_kawase).
# blur-kern = "3x3box";

# blur-exclude → Ventanas excluidas del blur.
#   Polybar y dunst no necesitan blur y sería costoso calcularlo para ellos.
#   Las ventanas de escritorio tampoco (nitrogen/feh wallpaper).
blur-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'dunst'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];


# =============================================================================
# BORDES REDONDEADOS
# =============================================================================
#
# Picom puede redondear las esquinas de las ventanas a nivel de compositor,
# sin modificar la aplicación. Esto es lo que da el look "Hyprland" en i3.
#
# NOTA: Esta función requiere picom-git (versión de desarrollo) o picom ≥ 10.
# En Linux Mint con apt puede no estar disponible. Verifica con:
#   picom --version
# Si la versión es < 10, compila desde: https://github.com/yshui/picom
#
corner-radius = 10;
# Valor en píxeles. 8–12 es el rango que se ve natural.
# Hyprland por defecto usa 10–12.

# corners-rule → Excepciones al radio de esquinas por app.
#   Las barras (Polybar, dock) deben tener esquinas cuadradas (0).
corners-rule = [
    "0:class_g = 'Polybar'",
    "0:window_type = 'dock'",
    "0:window_type = 'desktop'"
];


# =============================================================================
# ANIMACIONES
# =============================================================================
#
# IMPORTANTE: Las animaciones de ventanas (open/close/slide) requieren
# picom con el parche de animaciones de @dccsillag o la versión de
# FT-Labs: https://github.com/FT-Labs/picom
#
# La versión estándar de picom NO incluye animaciones.
# Si usas picom-animations de FT-Labs, descomenta el bloque de abajo.
#
# Para instalar picom-animations (FT-Labs):
#   sudo apt install libconfig-dev libgl-dev libpcre2-dev libevdev-dev \
#                    libx11-xcb-dev libxcb-damage0-dev uthash-dev
#   git clone https://github.com/FT-Labs/picom ~/.local/src/picom-ftlabs
#   cd ~/.local/src/picom-ftlabs
#   meson setup --buildtype=release build
#   ninja -C build
#   sudo ninja -C build install
#
# --- Bloque de animaciones (FT-Labs picom) -----------------------------------
#
# animations = true;
#
# animation-stiffness = 220;
# # Rigidez del resorte de animación. Mayor = más rápido y brusco.
# # 150–250 para el L440: snappy sin ser instantáneo.
#
# animation-dampening = 28;
# # Amortiguación. Mayor = menos "rebote" al final de la animación.
# # 25–35 para movimiento natural.
#
# animation-clamping = false;
# # Si true, limita la animación a no superar el valor final.
# # false permite un pequeño overshoot (más natural).
#
# animation-mass = 1;
# # Masa del resorte. Mayor = más inercia, movimiento más "pesado".
#
# animation-for-open-window = "zoom";
# # Efecto al ABRIR una ventana. Opciones: zoom, slide-up, slide-down,
# # slide-left, slide-right, fly-in, none.
# # "zoom" = escala desde el centro (efecto Hyprland por defecto).
#
# animation-for-unmap-window = "zoom";
# # Efecto al CERRAR/minimizar una ventana.
#
# animation-for-workspace-switch-in = "slide-right";
# # Efecto al cambiar al workspace actual (entra desde la izquierda).
#
# animation-for-workspace-switch-out = "slide-left";
# # Efecto al salir del workspace actual (sale hacia la izquierda).
#
# animation-for-transient-window = "slide-up";
# # Efecto para ventanas transitorias (diálogos, popups).
#
# animation-exclude = [
#     "window_type = 'dock'",
#     "window_type = 'desktop'"
# ];

# --- Fading (disponible en picom estándar) -----------------------------------
#
# El fading es la alternativa al zoom para picom estándar.
# Hace que las ventanas aparezcan y desaparezcan con fade in/out.
# No es tan vistoso como zoom, pero funciona con cualquier versión de picom.
#
fading = true;

# fade-in-step → Cuánto aumenta la opacidad por frame al aparecer.
#   Valores pequeños (0.02–0.05) = fade lento y suave.
#   Valores grandes (0.1–0.2) = fade rápido, más cercano a instantáneo.
fade-in-step = 0.03;

# fade-out-step → Cuánto disminuye la opacidad por frame al cerrar.
fade-out-step = 0.03;

# fade-delta → Milisegundos entre cada paso del fade. 
#   Menor = animación más fluida pero más trabajo para el compositor.
#   4–6ms es el balance correcto para 60fps.
fade-delta = 4;

# fade-exclude → Ventanas que NO deben hacer fade.
fade-exclude = [
    "class_g = 'Polybar'",
    "window_type = 'dock'"
];

# no-fading-openclose → Si true, desactiva el fade específicamente
# en apertura/cierre de ventanas (solo lo aplica en focus changes).
no-fading-openclose = false;


# =============================================================================
# TIPOS DE VENTANA
# =============================================================================
#
# Configuraciones específicas por tipo de ventana (EWMH window types).
# Permite sobrescribir opacidad, blur y sombra para cada categoría.
#
wintypes:
{
    # tooltip → Tooltips flotantes (ej: al pasar el mouse en VS Code)
    tooltip = {
        fade = true;
        shadow = false;
        opacity = 0.92;
        focus = true;
        full-shadow = false;
    };
 
    # dock → Barras de tareas (Polybar). Sin sombra, siempre opaca.
    dock = {
        shadow = false;
        blur-background = false;
        opacity = 1.0;
    };
 
    # popup_menu → Menús contextuales (click derecho)
    popup_menu = {
        opacity = 0.95;
        shadow = true;
    };
 
    # dropdown_menu → Menús desplegables (barra de menú de apps)
    dropdown_menu = {
        opacity = 0.95;
        shadow = false;
    };
 
    # notification → Notificaciones de dunst
    notification = {
        shadow = false;
        fade = true;
        opacity = 1.0;
    };
 
    # dialog → Ventanas de diálogo (confirmaciones, file pickers)
    dialog = {
        shadow = true;
        fade = true;
    };
};


# =============================================================================
# DETECCIÓN DE FOCO Y RENDIMIENTO
# =============================================================================
#
# mark-wmwin-focused → Marca correctamente las ventanas del WM (i3) como
# enfocadas. Necesario para que inactive-opacity funcione bien con i3.
mark-wmwin-focused = true;

# mark-ovredir-focused → Marca ventanas con override-redirect (menus,
# algunos popups de Java) como enfocadas si capturan el input.
mark-ovredir-focused = true;

# detect-rounded-corners → Picom detecta si la app ya tiene sus propias
# esquinas redondeadas y no aplica las suyas encima (evita doble radio).
detect-rounded-corners = true;

# detect-client-opacity → Respeta la opacidad que la propia app declara
# vía _NET_WM_WINDOW_OPACITY. Importante para apps como Alacritty.
detect-client-opacity = true;

# detect-transient → Trata las ventanas transitorias (diálogos hijos)
# de la misma forma que su ventana padre para focus.
detect-transient = true;

# use-ewmh-active-win → Usa el estándar EWMH (_NET_ACTIVE_WINDOW) para
# detectar la ventana activa. Más preciso con i3 que la detección por defecto.
use-ewmh-active-win = true;

# refresh-rate → Hz del monitor. 0 = autodetección.
# L440 tiene pantalla de 60Hz.
refresh-rate = 0;


# =============================================================================
# LOGS Y DEBUG
# =============================================================================
#
# log-level → Nivel de verbosidad. En producción: "warn".
# Para debug activo: "debug" o "trace".
#
log-level = "warn";

# log-file → Si se especifica, escribe el log a un archivo en lugar de stderr.
# log-file = "/tmp/picom.log";
 
# show-all-xerrors → Muestra todos los errores X11. Solo útil para debug.
# show-all-xerrors = false;