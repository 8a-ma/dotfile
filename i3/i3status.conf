
# =============================================================================
# Barra de estado personalizada
#
# Colores de referencia:
#   background  #1e1e2e   base
#   foreground  #cdd6f4   text
#   surface     #313244   background-alt / selected bg
#   blue        #89b4fa   selected / info
#   green       #a6e3a1   ok / buena señal / carga alta
#   yellow      #f9e2af   advertencia / carga media
#   peach       #fab387   uso elevado
#   red         #f38ba8   urgente / carga crítica
#   mauve       #cba6f7   acento secundario (tiempo)
#   teal        #94e2d5   acento terciario (red)
# =============================================================================

general {
    colors            = true
    color_good        = "#a6e3a1"
    color_degraded    = "#f9e2af"
    color_bad         = "#f38ba8"
    interval          = 5
    output_format     = "i3bar"
}
 
# --- Orden de módulos en la barra (izq → der)
order += "ipv6"
order += "wireless _first_"
order += "ethernet _first_"
order += "battery all"
order += "cpu_usage"
order += "cpu_temperature 0"
order += "memory"
order += "disk /"
order += "tztime local"
 
 
# =============================================================================
# RED
# =============================================================================
 
ipv6 {
    # Muestra la dirección IPv6 si está disponible; si no, queda vacío
    format_up   = "  %ip"
    format_down = ""
}
 
wireless _first_ {
    # %essid = nombre de la red, %quality = % de señal, %ip = IPv4
    format_up   = "  %essid  %quality  %ip"
    format_down = "  sin wifi"
}
 
ethernet _first_ {
    # Activo solo si hay cable conectado
    format_up   = "  %ip  (%speed)"
    format_down = ""
}
 
 
# =============================================================================
# BATERÍA
# =============================================================================
 
battery all {
    # %status: CHR / DIS / FULL  |  %percentage  |  %remaining
    format          = "%status %percentage  %remaining"
    format_down     = "sin batería"
    status_chr      = " "
    status_bat      = " "
    status_unk      = "? "
    status_full     = " "
    path            = "/sys/class/power_supply/BAT%d/uevent"
    low_threshold   = 20
    threshold_type  = percentage
}
 
 
# =============================================================================
# CPU
# =============================================================================
 
cpu_usage {
    format         = " %usage"
    max_threshold  = 75
    degraded_threshold = 50
}
 
cpu_temperature 0 {
    # Ruta estándar ThinkPad (coronal de hwmon). Ajusta el hwmon si cambia.
    path           = "/sys/class/thermal/thermal_zone0/temp"
    format         = " %degrees °C"
    max_threshold  = 80
}
 
 
# =============================================================================
# MEMORIA RAM
# =============================================================================
 
memory {
    # %available = GiB libres  |  %percentage_used = % en uso
    format         = " %available  %percentage_used"
    format_degraded = " %available  %percentage_used !"
    threshold_degraded = "1G"
    threshold_critical = "500M"
}
 
 
# =============================================================================
# DISCO
# =============================================================================
 
disk "/" {
    # %avail = GiB libres  |  %percentage_avail = % libre
    format         = " %avail  %percentage_avail"
    format_below_threshold = " %avail !"
    low_threshold  = 10
}
 
# =============================================================================
# TIEMPO
# =============================================================================
 
tztime local {
    format     = " %Y-%m-%d %H:%M:%S"
}
