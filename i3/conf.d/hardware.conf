# =============================================================================
# hardware.conf — Controles de hardware específicos del ThinkPad L440
# =============================================================================

# --- Audio (PulseAudio)
bindsym XF86AudioRaiseVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +10% && $refresh_i3status
bindsym XF86AudioLowerVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -10% && $refresh_i3status
bindsym XF86AudioMute        exec --no-startup-id pactl set-sink-mute @DEFAULT_SINK@ toggle && $refresh_i3status
bindsym XF86AudioMicMute     exec --no-startup-id pactl set-source-mute @DEFAULT_SOURCE@ toggle && $refresh_i3status

# --- Brillo (descomenta si instalas brightnessctl)
# bindsym XF86MonBrightnessUp   exec --no-startup-id brightnessctl set +1%
# bindsym XF86MonBrightnessDown exec --no-startup-id brightnessctl set 1%-

# --- Media (playerctl)
bindsym Control+Shift+k exec --no-startup-id playerctl play-pause
bindsym Control+Shift+j exec --no-startup-id playerctl previous
bindsym Control+Shift+l exec --no-startup-id playerctl next